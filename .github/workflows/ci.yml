# CI leve por desenho: a suíte de testes é Python puro (pandas/numpy),
# então NÃO instalamos fastai/torch aqui — instalamos o pacote sem
# dependências e apenas o necessário para lint + testes. Treino com GPU
# fica fora do CI (ver README).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Instala o pacote (sem deps pesadas) + ferramentas de teste
        run: |
          pip install --no-deps -e .
          pip install pandas numpy pyyaml pytest ruff
      - name: Lint (ruff)
        run: ruff check src/ tests/ app/
      - name: Testes (pytest)
        run: pytest tests/ -v
